<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AI Todo App</title>
    <script>
      // Redirect all 404s back to index.html for React Router
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/?redirect=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
